services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://appuser:apppass@db:5432/appdb?schema=public
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  e2e:
    image: mcr.microsoft.com/playwright:v1.58.2-noble
    profiles: ["e2e"]
    working_dir: /work
    volumes:
      - ./:/work
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy
    environment:
      BASE_URL: http://app:3000
      CI: "true"
    command: sh -lc "npm ci && npx playwright test"

volumes:
  pgdata:
